<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Legal Agent</title>
  <style>
    :root {
      --bg: #1a1a1a;
      --surface: #2d2d2d;
      --primary: #4CAF50;
      --text: #ffffff;
      --text-muted: #a0a0a0;
      --border: #404040;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      flex-direction: column;
    }
    header {
      background-color: var(--surface);
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }
    .message {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-width: 85%;
    }
    .message.user {
      align-self: flex-end;
    }
    .message.assistant {
      align-self: flex-start;
    }
    .bubble {
      padding: 1rem 1.5rem;
      border-radius: 12px;
      line-height: 1.5;
    }
    .message.user .bubble {
      background-color: var(--primary);
      color: white;
      border-bottom-right-radius: 2px;
    }
    .message.assistant .bubble {
      background-color: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 2px;
      white-space: pre-wrap;
    }
    .input-area {
      padding: 2rem;
      background-color: var(--bg);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: center;
    }
    .input-wrapper {
      max-width: 800px;
      width: 100%;
      position: relative;
    }
    input[type="text"] {
      width: 100%;
      padding: 1rem 4rem 1rem 1.5rem;
      border-radius: 24px;
      border: 1px solid var(--border);
      background-color: var(--surface);
      color: var(--text);
      font-size: 1rem;
      box-sizing: border-box;
      outline: none;
    }
    input[type="text"]:focus {
      border-color: var(--primary);
    }
    button {
      position: absolute;
      right: 0.5rem;
      top: 0.5rem;
      bottom: 0.5rem;
      border: none;
      background-color: var(--primary);
      color: white;
      border-radius: 50%;
      width: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s;
    }
    button:hover {
      opacity: 0.9;
    }
    .download-card {
      margin-top: 1rem;
      padding: 1rem;
      background-color: rgba(76, 175, 80, 0.1);
      border: 1px solid var(--primary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .download-card a {
      color: var(--primary);
      text-decoration: none;
      font-weight: bold;
      padding: 0.5rem 1rem;
      border: 1px solid var(--primary);
      border-radius: 4px;
      transition: background-color 0.2s;
    }
    .download-card a:hover {
      background-color: var(--primary);
      color: white;
    }
    .loading {
      align-self: flex-start;
      color: var(--text-muted);
      font-size: 0.9rem;
      font-style: italic;
      display: none;
    }
  </style>
</head>
<body>

  <header>
    <h2>Distillery AI Agent</h2>
    <span style="color: var(--text-muted); font-size: 0.9rem;">Clean Slate Architecture</span>
  </header>

  <div class="chat-container" id="chat">
    <div class="message assistant">
      <div class="bubble">Hello! I am the Legal Operations Agent. I can help you draft Non-Disclosure Agreements (NDAs) or Service Agreements. Just tell me what you need, for example: <em>"Draft an NDA for Stark Industries"</em>.</div>
    </div>
  </div>
  
  <div class="loading" id="loading" style="padding: 0 2rem 1rem; max-width: 800px; margin: 0 auto; width: 100%;">Agent is thinking...</div>

  <div class="input-area">
    <div class="input-wrapper">
      <input type="text" id="userInput" placeholder="Ask the agent to generate an NDA..." autocomplete="off">
      <button id="sendBtn" title="Send">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
      </button>
    </div>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const loading = document.getElementById('loading');

    let messages = [];

    function appendMessage(role, text, downloadUrl = null) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${role}`;
      
      let html = \`<div class="bubble">\${text}</div>\`;
      if (downloadUrl) {
        html += \`
          <div class="download-card">
            <span>&#128196; Document Generated Successfully!</span>
            <a href="\${downloadUrl}" download>Download .docx</a>
          </div>
        \`;
      }
      
      msgDiv.innerHTML = html;
      chat.appendChild(msgDiv);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      appendMessage('user', text);
      messages.push({ role: 'user', content: text });
      
      userInput.value = '';
      loading.style.display = 'block';
      userInput.disabled = true;

      try {
        const res = await fetch('/api/agent/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages })
        });

        const data = await res.json();
        
        if (data.error) {
          appendMessage('assistant', 'Error: ' + data.error);
        } else {
          appendMessage('assistant', data.text || (data.tool_called ? 'I have generated the document for you.' : ''), data.download_url);
          messages.push({ role: 'assistant', content: data.text || 'Generated document.' });
        }
      } catch (err) {
        appendMessage('assistant', 'Network Error: ' + err.message);
      } finally {
        loading.style.display = 'none';
        userInput.disabled = false;
        userInput.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
